name: "Sentinel Predictive Analysis"
description: "Multi-agent predictive DevOps intelligence. Analyzes MR diffs to predict pipeline failures, intercept security risks, and forecast delivery delays BEFORE they happen. Posts structured report as MR comment."
public: true
definition:
  version: v1
  environment: ambient

  components:
    - name: "triage_agent"
      type: AgentComponent
      prompt_id: "sentinel_triage"
      inputs:
        - from: "context:goal"
          as: "user_request"
        - from: "context:project_id"
          as: "project_id"
      toolset:
        - "read_file"
        - "find_files"
        - "list_dir"
        - "grep"
        - "get_repository_file"
        - "get_merge_request"
        - "list_merge_request_diffs"
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success
        - on_tool_execution_failed

    - name: "pipeline_predictor"
      type: AgentComponent
      prompt_id: "sentinel_pipeline"
      inputs:
        - from: "context:triage_agent.final_answer"
          as: "triage_results"
        - from: "context:project_id"
          as: "project_id"
      toolset:
        - "read_file"
        - "find_files"
        - "grep"
        - "get_repository_file"
        - "get_job_logs"
        - "get_pipeline_failing_jobs"
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success
        - on_tool_execution_failed

    - name: "security_scanner"
      type: AgentComponent
      prompt_id: "sentinel_security"
      inputs:
        - from: "context:triage_agent.final_answer"
          as: "triage_results"
        - from: "context:project_id"
          as: "project_id"
      toolset:
        - "read_file"
        - "find_files"
        - "grep"
        - "get_repository_file"
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success
        - on_tool_execution_failed

    - name: "reporter"
      type: AgentComponent
      prompt_id: "sentinel_reporter"
      inputs:
        - from: "context:triage_agent.final_answer"
          as: "triage_results"
        - from: "context:pipeline_predictor.final_answer"
          as: "pipeline_predictions"
        - from: "context:security_scanner.final_answer"
          as: "security_findings"
        - from: "context:project_id"
          as: "project_id"
      toolset:
        - "create_merge_request_note"
        - "get_merge_request"
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success
        - on_tool_execution_failed

  prompts:
    - prompt_id: "sentinel_triage"
      name: "Sentinel Triage"
      prompt_template:
        system: |
          <role>You are the Sentinel Triage Agent - predictive DevOps intelligence built on GitLab Duo.</role>

          <mission>Rapidly assess merge request changes for pipeline, security, and delivery risks BEFORE problems occur.</mission>

          <instructions>
          - First use get_merge_request and list_merge_request_diffs to understand the changes
          - Read key project files (CI config, dependency files) with read_file
          - Score each risk dimension 0-10
          - When in doubt, flag the risk
          </instructions>

          <output_format>
          Respond with JSON:
          {"overall_risk_level":"low|medium|high|critical","pipeline_risk":{"score":0,"indicators":[],"recommendation":""},"security_risk":{"score":0,"indicators":[],"recommendation":""},"delivery_risk":{"score":0,"indicators":[],"recommendation":""},"summary":""}
          </output_format>
        user: |
          Analyze for risks: {{user_request}}
          Project ID: {{project_id}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 180

    - prompt_id: "sentinel_pipeline"
      name: "Sentinel Pipeline Predictor"
      prompt_template:
        system: |
          <role>You are the Sentinel Pipeline Predictor. Predict CI/CD failures BEFORE they occur.</role>

          <instructions>
          - Read .gitlab-ci.yml, dependency files, and test files
          - Check for dependency conflicts, build config issues, test breakage, integration problems
          - For each predicted failure, suggest a specific preventive action
          </instructions>

          <output_format>
          Respond with JSON:
          {"prediction":"pass|likely_fail|high_risk_fail","confidence":0.0,"predicted_failures":[{"type":"","description":"","prevention":"","auto_fixable":false}],"pipeline_health_score":0,"recommendations":[]}
          </output_format>
        user: |
          Triage Results: {{triage_results}}
          Project ID: {{project_id}}
          Predict pipeline outcomes.
        placeholder: history
      unit_primitives: []
      params:
        timeout: 180

    - prompt_id: "sentinel_security"
      name: "Sentinel Security Scanner"
      prompt_template:
        system: |
          <role>You are the Sentinel Security Scanner. Proactively identify vulnerabilities.</role>

          <severity>
          CRITICAL: Hardcoded secrets, SQL injection, RCE, auth bypass
          HIGH: Missing input validation, insecure crypto, path traversal
          MEDIUM: Info disclosure, missing security headers
          LOW: Deprecated functions, missing audit logging
          </severity>

          <output_format>
          Respond with JSON:
          {"scan_result":"clean|findings|critical_findings","findings":[{"severity":"","type":"","file":"","description":"","cwe":"","recommendation":"","auto_fixable":false}],"security_score":0,"summary":""}
          </output_format>
        user: |
          Triage Results: {{triage_results}}
          Project ID: {{project_id}}
          Perform security analysis.
        placeholder: history
      unit_primitives: []
      params:
        timeout: 180

    - prompt_id: "sentinel_reporter"
      name: "Sentinel Reporter"
      prompt_template:
        system: |
          <role>You are the Sentinel Reporter. Create a Markdown report and post it as an MR comment using create_merge_request_note.</role>

          <instructions>
          - First use get_merge_request to find the MR details and IID
          - Create a structured report with risk levels, findings, and recommendations
          - Post the report using create_merge_request_note
          - Format: ## Sentinel Predictive Analysis Report with Pipeline, Security, and Action sections
          </instructions>
        user: |
          Create and post a Sentinel report:
          Triage: {{triage_results}}
          Pipeline: {{pipeline_predictions}}
          Security: {{security_findings}}
          Project ID: {{project_id}}
      unit_primitives: []
      params:
        timeout: 120

  routers:
    - from: "triage_agent"
      to: "pipeline_predictor"
    - from: "pipeline_predictor"
      to: "security_scanner"
    - from: "security_scanner"
      to: "reporter"
    - from: "reporter"
      to: "end"

  flow:
    entry_point: "triage_agent"
